services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  # Single instance with 3 databases: mlflow_db, airflow_db, platform_db
  postgres:
    image: postgres:18.3
    mem_limit: 512m
    cpus: 1.0
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
    volumes:
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── SeaweedFS (S3-compatible object storage) ────────────────────────────────
  seaweedfs:
    image: chrislusf/seaweedfs:4.17
    mem_limit: 256m
    cpus: 0.5
    command: "server -master -volume -filer -s3 -s3.config=/etc/seaweedfs/s3.json -filer.port=8888 -ip.bind=0.0.0.0"
    volumes:
      - ./config/seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
      - seaweed_data:/data
    ports:
      - "8333:8333"
      - "9333:9333"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9333/cluster/status || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MLflow tracking server ──────────────────────────────────────────────────
  mlflow:
    build:
      context: ./dockerfiles
      dockerfile: mlflow.Dockerfile
    mem_limit: 512m
    cpus: 0.5
    command: >
      mlflow server
      --backend-store-uri postgresql://${MLFLOW_DB_USER}:${MLFLOW_DB_PASSWORD}@postgres:5432/mlflow_db
      --default-artifact-root s3://mlplatform-artifacts/
      --host 0.0.0.0
      --port 5000
      --allowed-hosts "*"
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      MLFLOW_S3_ENDPOINT_URL: http://seaweedfs:8333
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # ── Airflow (standalone mode with DockerOperator) ───────────────────────────
  airflow:
    build:
      context: ./dockerfiles
      dockerfile: airflow.Dockerfile
    mem_limit: 1g
    cpus: 1.0
    command: airflow standalone
    restart: unless-stopped
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/airflow_db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DAG_PROCESSOR__REFRESH_INTERVAL: "10"
      AIRFLOW__SCHEDULER__SCHEDULER_HEALTH_CHECK_THRESHOLD: "120"
    group_add:
      - "${DOCKER_GID}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dags:/opt/airflow/dags
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v2/monitor/health | python3 -c \"import sys,json; d=json.load(sys.stdin); sys.exit(0 if d['scheduler']['status']=='healthy' else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  # ── PySparkling (standalone batch service for Airflow DockerOperator) ───────
  pysparkling:
    build:
      context: ./dockerfiles
      dockerfile: pysparkling.Dockerfile
    image: pysparkling:latest
    mem_limit: 1g
    cpus: 1.0
    profiles: ["tools"]
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://seaweedfs:8333
    entrypoint: ["spark-submit"]
    command: ["--help"]

  # ── JupyterLab (interactive development with PySparkling) ──────────────────
  jupyterlab:
    build:
      context: ./dockerfiles
      dockerfile: jupyterlab.Dockerfile
    mem_limit: 2g
    cpus: 2.0
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      MLFLOW_S3_ENDPOINT_URL: http://seaweedfs:8333
      JUPYTER_ENABLE_LAB: "yes"
    volumes:
      - ./notebooks:/home/jovyan/work
    ports:
      - "8888:8888"
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  pg_data:
  seaweed_data:
